<!doctype html>
<html lang="en">
  <head>
    <title>Steam Profile</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="navbar">
      <a href="/">
        <h1 class="logo">Showcase<span>GG</span></h1>
      </a>

      <nav>
        <a href="/home">Home</a>
        <a href="/gallery">Gallery</a>
        <a href="/about">About</a>
        <a href="/functionality">Functionality</a>
      </nav>
    </header>

    <div class="cardContainer">
      <button id="tiltButton" onclick="toggleTilt()">Toggle 3D</button>
      <div class="profileCard js-tilt">
        <div class="profileHeader">
          <div class="profileLabel">
            <p>STEAM PROFILE</p>
            <h1 id="usernameDisplay">Loading...</h1>
          </div>
          <div
            style="
              font-weight: bold;
              font-size: 22px;
              color: black;
              flex-shrink: 0;
              margin-left: auto;
              margin-right: auto;
            "
          >
            Showcase<span style="color: #7c5cff">GG</span>
          </div>
          <div class="profileGradeBox">
            <div id="qrcode"></div>
            <div class="gradeText">
              <p>GRADE</p>
              <h2>10</h2>
            </div>
          </div>
        </div>

        <div class="profileAvatar">
          <img id="avatarImage" />
        </div>

        <div class="profileHours">
          <p id="totalHours"></p>
        </div>

        <div class="profileGames">
          <h2>Most Played Games</h2>

          <div id="gamesList"></div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/vanilla-tilt@1.8.1/dist/vanilla-tilt.min.js"></script>
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script src="main.js"></script>
  </body>
</html>
